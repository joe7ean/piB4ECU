<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Passat ECU">
<title>Passat B4 — ECU</title>
<style>
  :root {
    --bg:     #0f0f0f;
    --bg2:    #1a1a1a;
    --bg3:    #232323;
    --border: rgba(255,255,255,0.08);
    --text:   #e8e6e0;
    --muted:  #7a7870;
    --blue:   #378ADD;
    --green:  #1D9E75;
    --amber:  #EF9F27;
    --red:    #E24B4A;
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow-x: hidden; }

  /* ── Header ── */
  .header {
    position: sticky; top: 0; z-index: 10;
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    background: rgba(15,15,15,0.85);
    backdrop-filter: blur(16px);
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .header-title { font-size: 17px; font-weight: 600; letter-spacing: -.02em; }
  .header-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .status-dot   { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background .4s; }
  .status-dot.live { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 0; padding: 12px 16px;
    overflow-x: auto; scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 7px 16px; border-radius: 20px;
    font-size: 14px; font-weight: 500; border: none; cursor: pointer;
    background: transparent; color: var(--muted); transition: all .2s;
  }
  .tab.active { background: var(--bg3); color: var(--text); }

  /* ── Scroll area ── */
  .content {
    padding: 16px;
    padding-bottom: calc(var(--safe-bot) + 24px);
    display: none;
  }
  .content.active { display: block; }

  /* ── Cards ── */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .grid1 { margin-bottom: 10px; }

  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
    position: relative; overflow: hidden;
  }
  .card-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .card-value { font-size: 30px; font-weight: 600; letter-spacing: -.02em; line-height: 1; }
  .card-unit  { font-size: 13px; color: var(--muted); margin-left: 2px; }
  .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: 14px 14px 0 0; }

  /* ── Sparkline ── */
  .spark { display: block; width: 100%; height: 40px; margin-top: 8px; }

  /* ── Gauge ── */
  .gauge-wrap { text-align: center; padding: 8px 0 4px; }
  .gauge-svg  { width: 100%; max-width: 160px; }

  /* ── Mini values ── */
  .mini-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
  .mini-val  { font-size: 20px; font-weight: 600; }
  .mini-lbl  { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ── Faults ── */
  .fault-item {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 8px;
  }
  .fault-code  { font-size: 12px; font-weight: 600; font-family: monospace; flex-shrink: 0; padding: 3px 8px; border-radius: 6px; }
  .fault-err   { background: rgba(226,75,74,.2); color: #f08080; }
  .fault-warn  { background: rgba(239,159,39,.2); color: #f0b060; }
  .fault-desc  { font-size: 13px; line-height: 1.4; }
  .fault-status{ font-size: 11px; color: var(--muted); margin-top: 2px; }
  .no-faults   { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 14px; }

  /* ── Raw log ── */
  .log-box {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px;
    font-family: 'Menlo', 'Courier New', monospace; font-size: 11px;
    color: #6a6; line-height: 1.8; max-height: 320px; overflow-y: auto;
  }
  .log-entry-rx { color: #5a9; }
  .log-entry-tx { color: #666; }

  /* ── Action button ── */
  .btn {
    width: 100%; padding: 14px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--bg3);
    color: var(--text); font-size: 15px; font-weight: 500;
    cursor: pointer; margin-top: 8px; transition: opacity .2s;
  }
  .btn:active { opacity: .6; }
  .btn-danger { border-color: rgba(226,75,74,.4); color: var(--red); }

  /* ── Offline banner ── */
  #offline-banner {
    display: none; background: rgba(226,75,74,.15); border-bottom: 1px solid rgba(226,75,74,.3);
    padding: 8px 16px; font-size: 13px; color: var(--red); text-align: center;
  }

  /* ── Section label ── */
  .section-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin: 16px 0 8px; }
</style>
</head>
<body>

<div id="offline-banner">⚠ Verbindung unterbrochen — reconnecting…</div>

<div class="header">
  <div>
    <div class="header-title">Passat B4</div>
    <div class="header-sub" id="ident-label">Verbinde…</div>
  </div>
  <div class="status-dot" id="status-dot"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('drive')">Antrieb</button>
  <button class="tab"        onclick="showTab('temp')">Temperaturen</button>
  <button class="tab"        onclick="showTab('faults')">Fehler</button>
  <button class="tab"        onclick="showTab('raw')">Rohdaten</button>
</div>

<!-- ── ANTRIEB ── -->
<div class="content active" id="tab-drive">
  <div class="grid2">
    <div class="card" id="card-rpm">
      <div class="card-accent" style="background:var(--blue)"></div>
      <div class="card-label">Drehzahl</div>
      <div><span class="card-value" id="v-rpm">—</span><span class="card-unit">U/min</span></div>
      <svg class="spark" id="spark-rpm" viewBox="0 0 200 40" preserveAspectRatio="none">
        <polyline id="pl-rpm" fill="none" stroke="var(--blue)" stroke-width="1.5" points=""/>
      </svg>
    </div>
    <div class="card">
      <div class="card-accent" style="background:var(--green)"></div>
      <div class="card-label">Geschwindigkeit</div>
      <div><span class="card-value" id="v-speed">—</span><span class="card-unit">km/h</span></div>
      <svg class="spark" id="spark-speed" viewBox="0 0 200 40" preserveAspectRatio="none">
        <polyline id="pl-speed" fill="none" stroke="var(--green)" stroke-width="1.5" points=""/>
      </svg>
    </div>
  </div>
  <div class="grid3">
    <div class="mini-card"><div class="mini-val" id="v-lambda">—</div><div class="mini-lbl">Lambda λ</div></div>
    <div class="mini-card"><div class="mini-val" id="v-timing">—</div><div class="mini-lbl">Zündwinkel °</div></div>
    <div class="mini-card"><div class="mini-val" id="v-inj">—</div><div class="mini-lbl">Einspritz. ms</div></div>
  </div>
  <div class="grid2">
    <div class="mini-card"><div class="mini-val" id="v-tps">—</div><div class="mini-lbl">Drosselkl. %</div></div>
    <div class="mini-card"><div class="mini-val" id="v-voltage">—</div><div class="mini-lbl">Batterie V</div></div>
  </div>
</div>

<!-- ── TEMPERATUREN ── -->
<div class="content" id="tab-temp">
  <div class="grid2">
    <div class="card">
      <div class="card-accent" style="background:var(--red)"></div>
      <div class="card-label">Kühlmittel</div>
      <div><span class="card-value" id="v-coolant">—</span><span class="card-unit">°C</span></div>
      <svg class="spark" viewBox="0 0 200 40" preserveAspectRatio="none">
        <polyline id="pl-coolant" fill="none" stroke="var(--red)" stroke-width="1.5" points=""/>
      </svg>
    </div>
    <div class="card">
      <div class="card-accent" style="background:var(--blue)"></div>
      <div class="card-label">Ansaugluft</div>
      <div><span class="card-value" id="v-airtemp">—</span><span class="card-unit">°C</span></div>
      <svg class="spark" viewBox="0 0 200 40" preserveAspectRatio="none">
        <polyline id="pl-airtemp" fill="none" stroke="var(--blue)" stroke-width="1.5" points=""/>
      </svg>
    </div>
  </div>
  <div class="section-label">Weitere Werte</div>
  <div class="grid3">
    <div class="mini-card"><div class="mini-val" id="v-map">—</div><div class="mini-lbl">Druck kPa</div></div>
    <div class="mini-card"><div class="mini-val" id="v-airmass">—</div><div class="mini-lbl">Luftmasse g/s</div></div>
    <div class="mini-card"><div class="mini-val" id="v-idle">—</div><div class="mini-lbl">Leerlauf %</div></div>
  </div>
</div>

<!-- ── FEHLERCODES ── -->
<div class="content" id="tab-faults">
  <div id="fault-list"></div>
  <button class="btn btn-danger" onclick="clearFaults()">Fehlerspeicher löschen</button>
</div>

<!-- ── ROHDATEN ── -->
<div class="content" id="tab-raw">
  <div class="section-label">KW1281 Seriell-Log</div>
  <div class="log-box" id="raw-log"></div>
  <button class="btn" onclick="document.getElementById('raw-log').innerHTML=''">Log leeren</button>
</div>

<script>
// ── Sparkline history ──────────────────────────────────────────────────────────
const hist = {};
const MAX_HIST = 60;

function push(key, val) {
  if (!hist[key]) hist[key] = [];
  hist[key].push(val);
  if (hist[key].length > MAX_HIST) hist[key].shift();
}

function sparkPoints(key, w=200, h=40) {
  const arr = hist[key] || [];
  if (arr.length < 2) return '';
  const mn = Math.min(...arr), mx = Math.max(...arr);
  const range = mx - mn || 1;
  return arr.map((v,i) =>
    `${(i/(arr.length-1)*w).toFixed(1)},${(h-(v-mn)/range*(h-4)-2).toFixed(1)}`
  ).join(' ');
}

// ── Tab switching ──────────────────────────────────────────────────────────────
function showTab(id) {
  document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  event.target.classList.add('active');
}

// ── Data rendering ─────────────────────────────────────────────────────────────
function set(id, val, decimals=0) {
  const el = document.getElementById('v-'+id);
  if (!el) return;
  el.textContent = val === null || val === undefined ? '—'
    : typeof val === 'number' ? val.toFixed(decimals) : val;
}

function renderData(data) {
  const d = data.data || {};
  const get = (key) => d[key]?.value;

  const rpm = get('Drehzahl');
  if (rpm !== undefined) { set('rpm', rpm); push('rpm', rpm); }

  const speed = get('Geschwindigkeit');
  if (speed !== undefined) { set('speed', speed); push('speed', speed); }

  const cool = get('Kühlmitteltemperatur');
  if (cool !== undefined) { set('coolant', cool); push('coolant', cool); }

  const air = get('Ansauglufttemperatur');
  if (air !== undefined) { set('airtemp', air); push('airtemp', air); }

  set('lambda',  get('Lambda'),        3);
  set('timing',  get('Zündwinkel'),    1);
  set('inj',     get('Einspritzzeit'), 2);
  set('tps',     get('Drosselklappe'), 1);
  set('voltage', get('Spannung'),      1);
  set('map',     get('Saugdruck'),     0);
  set('airmass', get('Luftmasse'),     2);
  set('idle',    get('Leerlaufregelung'), 0);

  // Update sparklines
  const sparks = {rpm:'rpm', speed:'speed', coolant:'coolant', airtemp:'airtemp'};
  for (const [histKey, plId] of Object.entries(sparks)) {
    const pl = document.getElementById('pl-'+plId);
    if (pl) pl.setAttribute('points', sparkPoints(histKey));
  }

  // Faults
  renderFaults(data.faults || []);

  // Raw log
  const log = document.getElementById('raw-log');
  const ts = new Date().toLocaleTimeString('de-DE');
  const entries = Object.entries(d).slice(0, 4)
    .map(([k,v]) => `<span class="log-entry-rx">[${ts}] ${k}: ${v.value} ${v.unit}</span>`)
    .join('\n');
  log.innerHTML = entries + (log.innerHTML ? '\n' + log.innerHTML : '');
  if (log.innerHTML.length > 4000) log.innerHTML = log.innerHTML.slice(0, 4000);
}

function renderFaults(faults) {
  const el = document.getElementById('fault-list');
  if (!faults.length) {
    el.innerHTML = '<div class="no-faults">Kein Fehlerspeicher ✓</div>';
    return;
  }
  el.innerHTML = faults.map(f => `
    <div class="fault-item">
      <span class="fault-code ${f.status==='gespeichert'?'fault-err':'fault-warn'}">${f.code}</span>
      <div>
        <div class="fault-desc">${f.desc}</div>
        <div class="fault-status">${f.status}</div>
      </div>
    </div>`).join('');
}

async function clearFaults() {
  const res = await fetch('/api/clear-faults', {method:'POST'});
  const json = await res.json();
  if (json.ok) renderFaults([]);
  else alert('Fehler: ' + json.error);
}

// ── WebSocket ──────────────────────────────────────────────────────────────────
let ws, reconnectTimer;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('offline-banner').style.display = 'none';
    document.getElementById('status-dot').classList.add('live');
    clearTimeout(reconnectTimer);
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'data') {
      document.getElementById('ident-label').textContent = msg.ident || 'verbunden';
      renderData(msg);
    } else if (msg.type === 'error') {
      document.getElementById('ident-label').textContent = '⚠ ' + msg.message;
    }
  };

  ws.onclose = () => {
    document.getElementById('status-dot').classList.remove('live');
    document.getElementById('offline-banner').style.display = 'block';
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

connect();
</script>
</body>
</html>
